services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-stock_guard_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-stock_guard_test}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-stock_guard_test_password}
    ports:
      - "${POSTGRES_TEST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 30
