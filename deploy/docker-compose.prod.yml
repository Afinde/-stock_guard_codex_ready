services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.prod
    env_file:
      - path: ../.env.prod
        required: false
    environment:
      DEPLOYMENT_PROFILE: ECS_LITE
      DATABASE_URL: postgresql+psycopg://root:123456@postgres:5432/stock_guard
      ENABLE_SERVER_BACKTEST: "false"
      ENABLE_PAPER_ORDER_WRITE: "false"
      ENABLE_LIVE_PROVIDER: "false"
      ENABLE_LIVE_ORDER: "false"
      ENABLE_WEBSOCKET: "false"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../backups:/app/backups
    restart: unless-stopped
    mem_limit: 800m
    cpus: 1.25
    pids_limit: 256
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.25
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  job-runner:
    profiles: ["jobs"]
    build:
      context: ..
      dockerfile: Dockerfile.prod
    env_file:
      - path: ../.env.prod
        required: false
    environment:
      DEPLOYMENT_PROFILE: ECS_LITE
      DATABASE_URL: postgresql+psycopg://root:123456@postgres:5432/stock_guard
      ENABLE_SERVER_BACKTEST: "false"
      ENABLE_PAPER_ORDER_WRITE: "false"
      ENABLE_LIVE_PROVIDER: "false"
      ENABLE_LIVE_ORDER: "false"
      ENABLE_WEBSOCKET: "false"
    command: ["python", "-m", "app.local_jobs", "--run-pending-once"]
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../backups:/app/backups
    mem_limit: 560m
    cpus: 0.75
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_guard
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: ["postgres", "-c", "max_connections=20", "-c", "shared_buffers=128MB"]
    expose:
      - "5432"
    volumes:
      - ../postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 448m
    cpus: 0.5
    pids_limit: 128
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d stock_guard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
